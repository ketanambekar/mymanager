services:
  - type: web
    name: mymanager-api-prod
    runtime: node
    rootDir: backend
    region: singapore
    plan: starter
    buildCommand: npm install; npx prisma generate; npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://mymanger.in,https://www.mymanger.in
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_DAYS
        value: "14"
      - key: REFRESH_TOKEN_COOKIE_NAME
        value: mm_refresh_token
